<!DOCTYPE html>
<html lang="en" data-ix-theme="classic" data-ix-color-schema="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slider error example</title>
    <script type="module" crossorigin src="../assets/slider-error-D48L5qor.js"></script>
    <link rel="modulepreload" crossorigin href="../assets/global-C4tOo1JZ.js">
    <link rel="modulepreload" crossorigin href="../assets/init-C6MyAp9T.js">
    <link rel="stylesheet" crossorigin href="../assets/global-C5TDzPsE.css">
  </head>
  <body>
    <ix-slider class="ix-invalid" trace trace-reference="50">
      <span slot="label-start">0</span>
      <span slot="label-end">100</span>
    </ix-slider>

    <ix-slider
      class="ix-invalid"
      min="0"
      max="50"
      step="10"
      value="20"
      trace
      trace-reference="50"
      invalid-text="Error message"
    >
      <span slot="label-start">0</span>
      <span slot="label-end">50</span>
    </ix-slider>

  </body>
</html>
