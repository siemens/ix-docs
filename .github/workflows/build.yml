name: Build

on:
  push:
    branches:
      - 'main'
      - 'release/**'
  workflow_dispatch:

jobs:
  validate-env:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail if storybook deployment type is configured
        run: |
          if grep -R --include='.env*' -nE '^[[:space:]]*DOCS_DEPLOYMENT_TYPE[[:space:]]*=[[:space:]]*"storybook"[[:space:]]*$' .; then
            echo "DOCS_DEPLOYMENT_TYPE=storybook must not be committed in .env files for this pipeline." >&2
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/workflows/actions/turbo

      - name: Build
        run: pnpm build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC: ${{ secrets.CSC }}
          BRAND_URL: ${{ vars.BRAND_URL }}

      - name: Upload markdown artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-markdown-${{ github.run_id }}
          path: |
            build/docs/*.md
            build/docs/**/*.md
          if-no-files-found: error
